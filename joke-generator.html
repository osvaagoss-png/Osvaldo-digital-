<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .joke-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .joke-text {
            font-size: 1.3em;
            line-height: 1.6;
            font-weight: 500;
        }

        .joke-type {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 15px;
            font-style: italic;
        }

        .loading {
            display: none;
            font-size: 1.2em;
            color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .copy-btn {
            background: #4CAF50;
        }

        .copy-btn:hover {
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        .error {
            color: #d32f2f;
            padding: 15px;
            background: #ffebee;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .stats {
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .joke-text {
                font-size: 1.1em;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <p class="subtitle">Get a random joke every time!</p>

        <div class="error" id="errorMsg"></div>

        <div class="joke-box">
            <div class="loading" id="loading">Loading joke...</div>
            <div id="jokeContainer" style="display: none;">
                <div class="joke-text" id="jokeText"></div>
                <div class="joke-type" id="jokeType"></div>
            </div>
        </div>

        <div class="button-group">
            <button onclick="getJoke()">🎲 New Joke</button>
            <button class="copy-btn" onclick="copyJoke()">📋 Copy Joke</button>
        </div>

        <div class="stats">
            <p>Jokes loaded: <span id="jokeCount">0</span></p>
        </div>
    </div>

    <script>
        let currentJoke = '';
        let jokeCount = 0;

        // Load initial joke on page load
        window.addEventListener('load', getJoke);

        async function getJoke() {
            const loadingEl = document.getElementById('loading');
            const jokeContainer = document.getElementById('jokeContainer');
            const errorMsg = document.getElementById('errorMsg');
            const jokeText = document.getElementById('jokeText');
            const jokeType = document.getElementById('jokeType');

            // Show loading state
            loadingEl.style.display = 'block';
            jokeContainer.style.display = 'none';
            errorMsg.style.display = 'none';

            try {
                // Using JokeAPI - Free API for random jokes
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?type=single');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error('Could not fetch joke');
                }

                // Extract joke data
                currentJoke = data.joke;
                const category = data.category;

                // Display joke
                jokeText.textContent = currentJoke;
                jokeType.textContent = `Category: ${category}`;

                // Update counter
                jokeCount++;
                document.getElementById('jokeCount').textContent = jokeCount;

                // Hide loading and show joke
                loadingEl.style.display = 'none';
                jokeContainer.style.display = 'block';

            } catch (error) {
                console.error('Error fetching joke:', error);
                errorMsg.textContent = '❌ Error loading joke. Please try again.';
                errorMsg.style.display = 'block';
                loadingEl.style.display = 'none';
            }
        }

        function copyJoke() {
            if (!currentJoke) {
                alert('No joke to copy!');
                return;
            }

            // Copy to clipboard
            navigator.clipboard.writeText(currentJoke).then(() => {
                alert('✅ Joke copied to clipboard!');
            }).catch(() => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = currentJoke;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('✅ Joke copied to clipboard!');
            });
        }
    </script>
</body>
</html>
